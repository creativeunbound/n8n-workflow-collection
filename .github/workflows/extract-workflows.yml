name: Extract Workflows from GitHub Repos

on:
  schedule:
    - cron: '0 19 * * 2'  # Weekly on Tuesdays at 7 PM UTC (3 AM Wednesday GMT+8/SG Time)
  workflow_dispatch:  # Allow manual trigger

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Extract workflows via GitHub API (no cloning)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/extract_from_repos.py

      - name: Deduplicate workflows
        run: python3 scripts/deduplicate.py workflows/github/

      - name: Update index
        run: python3 scripts/update_index.py

      - name: Commit workflows
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add workflows/github/ index.json README.md
          git commit -m "🔗 GitHub extraction: $(date +%Y-%m-%d)" || exit 0
          git push
