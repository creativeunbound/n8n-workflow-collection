name: Collect n8n API Workflows

on:
  schedule:
    - cron: '0 19 * * 1'  # Weekly on Mondays at 7 PM UTC (3 AM Tuesday GMT+8/SG Time)
  workflow_dispatch:  # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect from n8n API
        run: python3 scripts/collect_n8n_api.py

      - name: Deduplicate workflows
        run: python3 scripts/deduplicate.py workflows/api/

      - name: Update index
        run: python3 scripts/update_index.py

      - name: Commit workflows
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add workflows/api/ index.json README.md
          git commit -m "📥 API collection: $(date +%Y-%m-%d)" || exit 0
          git push
